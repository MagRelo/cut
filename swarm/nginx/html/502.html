<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Play The Cut — Temporarily unavailable</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    main {
      max-width: 28rem;
      text-align: center;
    }
    .logo { font-size: 3rem; line-height: 1; margin-bottom: 1rem; }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }
    p {
      color: #475569;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
    }
    a, button {
      display: inline-block;
      font: inherit;
      font-size: 0.9375rem;
      font-weight: 500;
      text-decoration: none;
      border-radius: 0.5rem;
      padding: 0.625rem 1.25rem;
      cursor: pointer;
    }
    .primary {
      background: #0f172a;
      color: #fff;
      border: none;
    }
    .secondary {
      background: #fff;
      color: #0f172a;
      border: 1px solid #cbd5e1;
    }
    .secondary:hover { background: #f1f5f9; }
    .wordmark {
      margin-top: 2rem;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <main>
    <div class="logo" aria-hidden="true">⛳</div>
    <h1>We&rsquo;ll be right back</h1>
    <p>
      Play The Cut is temporarily unavailable. This usually clears up quickly
      during a deploy or brief outage.
    </p>
    <div class="actions">
      <a class="primary" href="https://playthecut.betteruptime.com/">View status page</a>
      <button class="secondary" type="button" onclick="location.reload()">Try again</button>
    </div>
    <p class="wordmark">PLAYTHECUT</p>
  </main>
</body>
</html>
