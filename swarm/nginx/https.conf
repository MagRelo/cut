# HTTPS + HTTP ACME — cert paths use certbot --cert-name cut (see scripts/bootstrap-tls.sh).
# Activated when stack.yml configs.nginx_site.file points here (see scripts/switch-to-https.sh).

resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/cut/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cut/privkey.pem;

    location / {
        set $upstream_app http://web:3000;
        proxy_pass $upstream_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
