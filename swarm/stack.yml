# Docker Swarm stack — deploy from repo root:
#   docker stack deploy -c swarm/stack.yml cut
#
# Prerequisites: swarm/env/web.env, cron.env, nginx.env on the manager.
# Nginx starts with http-only.conf; after certs, run scripts/switch-to-https.sh (patches this file) and redeploy.

configs:
  nginx_site:
    file: ./nginx/http-only.conf

services:
  nginx:
    image: nginx:1.27-alpine
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    configs:
      - source: nginx_site
        target: /etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-www:/var/www/certbot:ro
      - letsencrypt:/etc/letsencrypt:ro
    env_file:
      - ./env/nginx.env
    networks:
      - internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    image: ${CUT_APP_IMAGE:-magrelo/cut-v2:latest}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - ./env/web.env
    environment:
      NODE_ENV: production
      ENABLE_CRON: "false"
    networks:
      - internal
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      resources:
        limits:
          cpus: "1"
          memory: 768M
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "const p=process.env.PORT||3000;fetch(\"http://127.0.0.1:\"+p+\"/health\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  cron:
    image: ${CUT_APP_IMAGE:-magrelo/cut-v2:latest}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command: ["node", "dist/src/cron-app.js"]
    working_dir: /app/server
    env_file:
      - ./env/cron.env
    environment:
      NODE_ENV: production
      ENABLE_CRON: "true"
    networks:
      - internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      resources:
        limits:
          cpus: "0.75"
          memory: 512M

networks:
  internal:
    driver: overlay
    attachable: true

volumes:
  certbot-www:
  letsencrypt:
